      - name: Get project version
        id: get_version
        run: |
          if [ "${{ needs.resolve-version.outputs.do_build }}" = "true" ]; then
            echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
          fi

  final-version:
    runs-on: ubuntu-latest
    needs: [build, resolve-version]
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - name: Decide final version
        id: set
        run: |
          if [ "${{ needs.resolve-version.outputs.do_build }}" = "false" ]; then
            echo "version=${{ needs.resolve-version.outputs.version }}" >> $GITHUB_OUTPUT
          else
            if [ -z "${{ needs.build.outputs.version }}" ]; then
              echo "ERROR: build version missing" >&2
              exit 1
            fi
            echo "version=${{ needs.build.outputs.version }}" >> $GITHUB_OUTPUT
          fi
  
