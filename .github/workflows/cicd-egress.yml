  build:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'dev_develop'
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build package
        run: mvn -B clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-dev-${{ github.sha }}
          path: target/*.jar
          if-no-files-found: error

  deploy-dev:
    name: Deploy to DEV Databricks
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-dev-${{ github.sha }}
          path: target
