  create-pr-to-master: #Creates PR to master if not exists
    name: Create PR to master
    runs-on: ubuntu-24.04
    environment: pre
    needs: deploy-dev
    permissions:
      contents: write
      pull-requests: write
    env:
      GIT_TOKEN: ${{ secrets.GIT_TOKEN }} #Token responsible for creating PR
    steps: 
      - name: Check if PR exists
        id: pr_check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GIT_TOKEN }} #Token responsible for PR creation
          script: |
            const source = "dev_develop";
            const target = "dev_master";
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${source}`,
              base: target
            });
            return prs.data.length > 0 ? prs.data[0].number : null
 
      - name: Create Pull Request if none exists #Creates PR with review request, if there are no commits (differences) skips this step
        if: steps.pr_check.outputs.result == 'null'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GIT_TOKEN }} #Token responsible for PR creation
          script: |
            const source = "dev_develop";
            const target = "dev_master";

            const compare = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: target,
              head: source
            });
            if (compare.data.total_commits === 0) {
              core.info(`No new commits between ${source} and ${target}. Skipping PR creation.`);
              return;
            }
 
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Automerge ${source} → ${target}`,
              head: source,
              base: target,
              body: `Pull request created automatically by workflow. Requires approval.`
            });
            console.log(`PR created: ${pr.data.html_url}`);
            return pr.data.number

  deploy-pre:
    name: Merge to Master and Deploy to PRE Databricks
    runs-on: ubuntu-latest
    environment: pre
    needs: create-pr-to-master
    if: |
      (
        (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
        (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
      ) &&
      (
        (github.event.pull_request.base.ref == 'dev_master' && github.event.pull_request.head.ref == 'dev_develop')
      )
    permissions:
      contents: write

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_PRE_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PRE_TOKEN }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
