          #cp config/*.properties deploy-config/ 2>/dev/null || true
          #databricks fs cp deploy-config/ dbfs:/FileStore/configs/pre/ --recursive --overwrite
      #- run: |
          #JAR_FILE=$(ls target/*.jar | head -n 1)
          #JAR_NAME=$(basename "$JAR_FILE")
          #databricks fs cp "$JAR_FILE" \
            #"dbfs:/Volumes/aspi1/default/libs/exporter/app-pre.jar" \
            #--overwrite

  deploy-pro:
    name: Deploy to PRO Databricks
    runs-on: ubuntu-latest
    needs: deploy-pre
    environment: pro

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_PRO_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PRO_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-dev-${{ github.sha }}
          path: target
