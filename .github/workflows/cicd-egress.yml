      - name: Merge source into target #Merge code
        run: |
          git fetch origin dev_develop
          git merge -X theirs origin/dev_develop --allow-unrelated-histories --no-edit
          git push origin dev_master

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-dev-${{ github.sha }}
          path: target
