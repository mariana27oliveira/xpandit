name: cicd-egress

on:
  pull_request:
    branches:
      - dev_develop
    types:
      - closed
  workflow_dispatch:
    inputs:
      version_to_deploy:
        description: "Version to deploy/rollback (in case of rollback)"
        required: false
        default: ""
        type: string
 
 
permissions:
  contents: read
  pull-requests: write
  packages: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
      do_build: ${{ steps.set.outputs.do_build }}

    steps:
      - name: Decide mode
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version_to_deploy }}" ]; then
            echo "do_build=false" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version_to_deploy }}" >> $GITHUB_OUTPUT
          else
            echo "do_build=true" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          fi

  build:
    needs: resolve-version
    name: Build JAR
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Determine version
        id: version_check
        run: |
          if [ -z "${{ github.event.inputs.version_to_deploy }}" ]; then
            echo "build_required=true" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          else
            echo "build_required=false" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version_to_deploy }}" >> $GITHUB_OUTPUT
            echo "Skipping Build step"
            return;
          fi          
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build package
        if: steps.version_check.outputs.build_required == 'true'
        run: mvn -B clean package -DskipTests

      - name: Set up Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GIT_TOKEN }}</password>
              </server>
            </servers>

            <profiles>
              <profile>
                <id>github</id>
                <repositories>
                  <repository>
                    <id>github</id>
                    <url>https://maven.pkg.github.com/mariana27oliveira/xpandit</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>

            <activeProfiles>
              <activeProfile>github</activeProfile>
            </activeProfiles>
          </settings>
          EOF
      - name: Publish JAR to GitHub Packages
        run: mvn deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}

