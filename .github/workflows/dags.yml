name: Deploy DAGs
 
on:
  workflow_dispatch:
 
jobs:

  create-pr-to-master: #Creates PR to master if not exists
    name: Create PR to master
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    env:
      GIT_TOKEN: ${{ secrets.GIT_TOKEN }} #Token responsible for creating PR
    steps: 
      - name: Check if PR exists
        id: pr_check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GIT_TOKEN }} #Token responsible for PR creation
          script: |
            const source = "dev_develop";
            const target = "dev_master";
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${source}`,
              base: target
            });
            return prs.data.length > 0 ? prs.data[0].number : null
 
      - name: Create Pull Request if none exists #Creates PR with review request, if there are no commits (differences) skips this step
        if: steps.pr_check.outputs.result == 'null'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GIT_TOKEN }} #Token responsible for PR creation
          script: |
            const source = "dev_develop";
            const target = "dev_master";

            const compare = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: target,
              head: source
            });
            if (compare.data.total_commits === 0) {
              core.info(`No new commits between ${source} and ${target}. Skipping PR creation.`);
              return;
            }
 
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Automerge ${source} - ${target}`,
              head: source,
              base: target,
              body: `Pull request created automatically by workflow. Requires approval.`
            });
            console.log(`PR created: ${pr.data.html_url}`);   
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.data.number,
              reviewers: ['']
            });            
            return pr.data.number
            
  merge-master:
    name: Merge to Master
    runs-on: ubuntu-latest
    needs: create-pr-to-master
    environment: master
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Validate PR dev_develop > dev_master
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const source = "dev_develop";
            const target = "dev_master";
       
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              head: `${context.repo.owner}:${source}`,
              base: target
            });
       
            if (prs.data.length === 0) {
              core.setFailed("No PR found from dev_develop to dev_master.");
              return;
            }
       
            const pr = prs.data[0];
       
            // check merged
            const isMerged = pr.state === "closed" && pr.merged_at !== null;
       
            // check approvals
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
       
            const isApproved = reviews.data.some(r => r.state === "APPROVED");
       
            if (!isApproved && !isMerged) {
              core.setFailed("PR is neither approved nor merged. Blocking deployment.");
            } else {
              core.info(`PR validation passed. Approved: ${isApproved}, Merged: ${isMerged}`);
            }
    
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: dev_master
      - name: Configure Git #Personal infos necessary to merge and deploy
        run: |
          git config user.name "Mariana Oliveira" # USER
          git config user.email "mariana.oliveira@aegonsantander.pt" #CHANGE USER
 
      - name: Merge source into target #Merge code
        run: |
          git fetch origin dev_develop
          git merge -X theirs origin/dev_develop --allow-unrelated-histories --no-edit
          git push origin dev_master
 
  deploy-dev:
    runs-on: ubuntu-latest
    needs: merge-master
 
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev_develop
 
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
 
      - name: Upload DEV DAGs
        run: |
          az storage blob upload-batch \
            --account-name storage_dev \
            --destination airflow/dags \
            --source ./dev \
            --overwrite
 
  deploy-pre:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: pre
 
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev_develop
 
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
 
      - name: Upload PRE DAGs
        run: |
          az storage blob upload-batch \
            --account-name storage_pre \
            --destination airflow/dags \
            --source ./pre \
            --overwrite
 
  deploy-pro:
    runs-on: ubuntu-latest
    needs: deploy-pre
    environment: pro
 
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev_develop
 
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
 
      - name: Upload PRO DAGs
        run: |
          az storage blob upload-batch \
            --account-name storage_pro \
            --destination airflow/dags \
            --source ./pro \
            --overwrite
